name: Deploy site (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Read the repo, publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One publish at a time; never cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build
        run: |
          if [ -f package.json ]; then
            echo "Docusaurus detected — building to ./build"
            npm ci
            npm run build
            echo "ARTIFACT=build" >> "$GITHUB_ENV"
          else
            echo "No package.json yet — publishing the static placeholder"
            mkdir -p _site && cp index.html _site/
            echo "ARTIFACT=_site" >> "$GITHUB_ENV"
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.ARTIFACT }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
